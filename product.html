<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-page">

<img id="img">

<h2 id="name"></h2>

<p id="price" class="price"></p>

<div id="cart-products"></div>

<div class="buy-box">

<h3 class="form-title">🛒 بيانات الشراء</h3>

<div class="input-group">
<label>الاسم بالكامل</label>
<input type="text" id="clientName" placeholder="اكتب اسمك هنا">
</div>

<div class="input-group">
<label>رقم الهاتف</label>
<input type="text" id="clientPhone" placeholder="01xxxxxxxxx">
</div>

<div class="input-group">
<label>عنوان التوصيل</label>
<textarea id="clientAddress" placeholder="المحافظة - المدينة - الشارع"></textarea>
</div>

<div class="input-group">
<label>طريقة الدفع</label>
<select id="payment">
<option value="cash">الدفع عند الاستلام</option>
<option value="vodafone">فودافون كاش</option>
</select>
</div>

<button class="buy-btn" onclick="buyNow()">شراء الآن</button>

</div>
